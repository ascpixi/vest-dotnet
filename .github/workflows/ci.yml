name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vest-build-dotnet
        uses: actions/checkout@v4

      - name: Checkout vest-build
        uses: actions/checkout@v4
        with:
          repository: ascpixi/vest
          path: ../vest

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.18"

      - name: Install Python
        run: uv python install

      - name: Check that uv.lock is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --locked

      - name: Build package
        run: uv build
